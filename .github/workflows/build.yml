name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project PreviewChat.xcodeproj \
            -scheme PreviewChat \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify app bundle
        run: test -d build/Build/Products/Release/PreviewChat.app

      - name: Create DMG
        run: |
          chmod +x scripts/make_dmg.sh
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ./scripts/make_dmg.sh \
            build/Build/Products/Release/PreviewChat.app \
            PreviewChat-${SHORT_SHA}.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PreviewChat-${{ github.sha }}
          path: PreviewChat-*.dmg
          retention-days: 30
